name: Check Version Bump

on:
  pull_request:
    branches:
      - master

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify version bump
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          base_pkg=$(git show "$BASE_SHA":package.json | jq -r '.version')
          head_pkg=$(git show "$HEAD_SHA":package.json | jq -r '.version')
          base_tauri=$(git show "$BASE_SHA":src-tauri/tauri.conf.json | jq -r '.package.version')
          head_tauri=$(git show "$HEAD_SHA":src-tauri/tauri.conf.json | jq -r '.package.version')

          if [ "$base_pkg" = "$head_pkg" ] || [ "$base_tauri" = "$head_tauri" ]; then
            echo "Version must be bumped in both package.json and src-tauri/tauri.conf.json."
            echo "package.json: $base_pkg -> $head_pkg"
            echo "tauri.conf.json: $base_tauri -> $head_tauri"
            exit 1
          fi

          if [ "$head_pkg" != "$head_tauri" ]; then
            echo "Version mismatch between package.json and src-tauri/tauri.conf.json."
            echo "package.json: $head_pkg"
            echo "tauri.conf.json: $head_tauri"
            exit 1
          fi

          echo "Version bump detected and synchronized."
